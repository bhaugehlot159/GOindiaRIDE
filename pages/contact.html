<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - GOindiaRIDE</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .contact-container {
            width: 80%;
            margin: auto;
            padding: 20px;
        }
        .whatsapp-button {
            background-color: #25D366;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 20px 0;
        }
        .contact-form {
            display: flex;
            flex-direction: column;
        }
        .contact-form input, .contact-form textarea {
            margin: 10px 0;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="contact-container">
        <h1>Contact Us</h1>
        <p>If you have any questions or feedback, feel free to reach out to us!</p>
        <a href="https://wa.me/your-phone-number" class="whatsapp-button">Chat with us on WhatsApp</a>
        <p>Phone: +91-1234567890</p>
        <p>Email: contact@goindiaride.com</p>
        <h2>Our Location</h2>
        <iframe 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.7834004891553!2d144.96512371561528!3d-37.814352979751226!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6ad642af0b2b0a4b%3A0x74c05d89b35e7aa9!2sYour+Location!5e0!3m2!1sen!2sin!4v1613581460080!5m2!1sen!2sin" 
            width="600" 
            height="450" 
            style="border:0;" 
            allowfullscreen="" 
            loading="lazy"></iframe>
        <h2>Contact Form</h2>
        <form action="#" class="contact-form">
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <input type="text" placeholder="Subject" required>
            <textarea rows="4" placeholder="Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </div>
</body>
</html>
