<!-- Sample Content -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f3f5f9;
            color: #1f2937;
            margin: 0;
        }

        header, footer {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            color: #fff;
            padding: 16px 20px;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        #statistics,
        #user-management {
            background: #fff;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            padding: 18px;
            margin-bottom: 20px;
            box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
        }
    </style>
        <link rel="stylesheet" href="./brand-theme.css">
<link rel="stylesheet" href="./fit-screen.css">
    <script defer src="./js/non-home-fit.js"></script>
</head>
<body>
    <header>
        <h1>Admin Dashboard</h1>
    </header>
    <main>
        <section id="statistics">
            <h2>Statistics</h2>
            <div class="stat">
                <p>Total Users: 100</p>
            </div>
            <div class="stat">
                <p>Total Rides: 250</p>
            </div>
        </section>
        <section id="user-management">
            <h2>User Management</h2>
            <table>
                <thead>
                    <tr>
                        <th>User ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>John Doe</td>
                        <td>john@example.com</td>
                        <td>Active</td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>Jane Smith</td>
                        <td>jane@example.com</td>
                        <td>Inactive</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 GOindiaRIDE</p>
    </footer>
    <script src="./js/global-ui.js"></script>
</body>
</html>
