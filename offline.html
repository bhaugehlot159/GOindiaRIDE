<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - GO India RIDE</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#0b2f2a">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <style>
    :root {
      color-scheme: light;
      --ink: #0f172a;
      --muted: #475569;
      --line: #dbeafe;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --surface: #f8fafc;
      --panel: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: var(--surface);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(92vw, 560px);
      padding: 32px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand img {
      width: 44px;
      height: 44px;
      border-radius: 8px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.18;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.6;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 24px;
    }

    a,
    button {
      min-height: 44px;
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 11px 14px;
      font: 700 14px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-decoration: none;
      cursor: pointer;
    }

    a {
      background: var(--accent);
      color: #fff;
    }

    button {
      background: #fff;
      color: var(--accent-dark);
    }

    small {
      display: block;
      margin-top: 20px;
      color: #64748b;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main>
    <div class="brand">
      <img src="/icons/icon-192.png" alt="GO India RIDE">
      <span>GO India RIDE</span>
    </div>
    <h1>You are offline</h1>
    <p>Booking, driver GPS, OTP, payments and admin actions need a live connection. Recently opened app pages may still be available from your device cache.</p>
    <div class="actions">
      <a href="/index.html">Home</a>
      <a href="/book-cab.html">Booking</a>
      <button type="button" onclick="window.location.reload()">Retry</button>
    </div>
    <small>Saved app shell is active. New bookings and payment confirmations will resume when the network returns.</small>
  </main>
</body>
</html>
